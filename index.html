<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Test App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            background: rgba(0,0,0,0.2);
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 CI/CD Pipeline Working!</h1>
        <p>This page is deployed via Jenkins Pipeline</p>

        <p><strong>Version:</strong> v1</p>
        <p><strong>Environment:</strong> Test</p>

        <p id="time"></p>
    </div>

    <script>
        document.getElementById("time").innerHTML =
            "Deployed at: " + new Date().toLocaleString();
    </script>

</body>
</html>
